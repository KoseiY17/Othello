<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>オセロツール</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
      background: #f3f5f4;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      margin: 8px 0;
      text-align: center;
      font-size: 30px;
    }

    .description {
      margin: 0 0 28px;
      text-align: center;
      color: #555;
      line-height: 1.7;
    }

    .tool-card {
      display: block;
      margin-bottom: 16px;
      padding: 22px;
      color: inherit;
      text-decoration: none;
      background: white;
      border-radius: 14px;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.09);
      transition:
        transform 0.15s,
        box-shadow 0.15s;
    }

    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.14);
    }

    .tool-card:active {
      transform: scale(0.98);
    }

    .tool-title {
      margin: 0 0 8px;
      font-size: 20px;
      color: #08783e;
    }

    .tool-description {
      margin: 0;
      color: #555;
      line-height: 1.6;
    }

    .arrow {
      margin-top: 12px;
      text-align: right;
      color: #08783e;
      font-weight: bold;
    }

    footer {
      margin-top: 32px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <main class="container">

    <h1>オセロツール</h1>

    <p class="description">
      使用したいツールを選択してください。
    </p>

    <a
      class="tool-card"
      href="white-line-converter.html"
    >
      <h2 class="tool-title">
       定石暗記用 斜めどり  棋譜変換
      </h2>

      <p class="tool-description">
        ホワイトラインを軸として、
        オセロの棋譜を線対称に変換します。
      </p>

      <div class="arrow">
        ツールを開く →
      </div>
    </a>

    <footer>
      Othello Tools
    </footer>

  </main>

</body>
</html>
