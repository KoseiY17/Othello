<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>オセロ棋譜 ホワイトライン軸変換</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      font-size: 16px;
      font-family: monospace;
      box-sizing: border-box;
      resize: vertical;
      border: 1px solid #aaa;
      border-radius: 6px;
    }

    button {
      margin-top: 12px;
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
    }

    button:hover {
      background: #125ca5;
    }

    .error {
      color: #d32f2f;
      margin-top: 10px;
    }

    .example {
      color: #555;
      font-size: 14px;
    }

    #output {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>オセロ棋譜 ホワイトライン軸変換</h1>

    <p>
      A1からH8を結ぶホワイトラインを軸として、
      棋譜を線対称に変換します。
    </p>

    <p class="example">
      入力例：f2f5b6a4<br>
      変換例：F2 → B6
    </p>

    <label for="input">変換前の棋譜</label>

    <textarea
      id="input"
      placeholder="例：f2f5b6a4"
    ></textarea>

    <button type="button" onclick="convertRecord()">
      変換する
    </button>

    <p id="error" class="error"></p>

    <label for="output">変換後の棋譜</label>

    <textarea
      id="output"
      readonly
    ></textarea>

  </div>

  <script>

    /*
     * 1手分の座標を変換する。
     *
     * 例：
     * A2 → B1
     * F2 → B6
     * B2 → B2
     */
    function transposeMove(move) {

      const normalizedMove = move.toUpperCase();

      if (!/^[A-H][1-8]$/.test(normalizedMove)) {
        throw new Error("不正な座標です：" + move);
      }

      const column = normalizedMove[0];
      const row = normalizedMove[1];

      // 元の行番号を、新しい列にする
      // 1 → A、2 → B、…、8 → H
      const newColumn = String.fromCharCode(
        "A".charCodeAt(0) + Number(row) - 1
      );

      // 元の列を、新しい行番号にする
      // A → 1、B → 2、…、H → 8
      const newRow =
        column.charCodeAt(0) - "A".charCodeAt(0) + 1;

      return newColumn + newRow;
    }


    /*
     * 連続した棋譜全体を変換する。
     *
     * 例：
     * f2f5b6a4
     * ↓
     * B6E6F2D1
     */
    function convertRecord() {

      const inputElement = document.getElementById("input");
      const outputElement = document.getElementById("output");
      const errorElement = document.getElementById("error");

      errorElement.textContent = "";
      outputElement.value = "";

      /*
       * 空白、改行、カンマを削除する。
       *
       * そのため、
       * f2f5b6a4
       * f2 f5 b6 a4
       * f2,f5,b6,a4
       *
       * のどれでも入力可能。
       */
      const record = inputElement.value
        .replace(/[\s,]+/g, "")
        .toUpperCase();

      if (record === "") {
        errorElement.textContent = "棋譜を入力してください。";
        return;
      }

      /*
       * 1手は2文字なので、
       * 棋譜全体の文字数は偶数である必要がある。
       */
      if (record.length % 2 !== 0) {
        errorElement.textContent =
          "棋譜の文字数が不正です。最後の座標が途中で切れていないか確認してください。";
        return;
      }

      const moves = [];

      /*
       * 2文字ずつ分割する。
       *
       * f2f5b6a4
       * ↓
       * ["F2", "F5", "B6", "A4"]
       */
      for (let i = 0; i < record.length; i += 2) {
        moves.push(record.slice(i, i + 2));
      }

      try {

        const convertedMoves = moves.map(transposeMove);

        /*
         * 変換後も連続した棋譜として出力する。
         */
        outputElement.value = convertedMoves.join("");

      } catch (error) {

        outputElement.value = "";
        errorElement.textContent = error.message;

      }
    }

  </script>

</body>
</html>
