<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オセロ棋譜 ホワイトライン軸変換</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      font-size: 16px;
      font-family: monospace;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
    }

    button:hover {
      background: #125ca5;
    }

    #output {
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .example {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>オセロ棋譜 ホワイトライン軸変換</h1>

<p>
A1-H8（ホワイトライン）を軸として線対称に変換します。
</p>

<p class="example">
例：A2→B1、A4→D1、B1→A2、B2→B2
</p>

<label>変換前</label>

<textarea id="input"
placeholder="例：
F5 D6 C3 D3 C4"></textarea>

<br>

<button onclick="convertRecord()">
変換する
</button>

<p id="error" class="error"></p>

<label>変換後</label>

<textarea id="output" readonly></textarea>

</div>

<script>

function transposeMove(move){

    // 前後の空白除去＆大文字化
    move = move.trim().toUpperCase();

    // A～H、1～8 の形式かチェック
    if(!/^[A-H][1-8]$/.test(move)){
        throw new Error("不正な座標：" + move);
    }

    const col = move.charCodeAt(0) - 65;   // A→0
    const row = Number(move[1]) - 1;        // 1→0

    // 行列入れ替え
    const newCol = String.fromCharCode(65 + row);
    const newRow = col + 1;

    return newCol + newRow;
}

function convertRecord(){

    const input = document.getElementById("input").value;

    const output = document.getElementById("output");

    const error = document.getElementById("error");

    error.textContent = "";

    try{

        const moves = input
            .split(/[\s,]+/)
            .filter(x => x.length > 0);

        const converted = moves.map(transposeMove);

        output.value = converted.join(" ");

    }

    catch(e){

        output.value = "";

        error.textContent = e.message;

    }

}

</script>

</body>
</html>
